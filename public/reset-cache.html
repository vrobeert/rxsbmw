<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset cache BavarianHub</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #050507;
        color: #f5f5f7;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(420px, 100%);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 18px;
        background: #111116;
        padding: 24px;
        box-shadow: 0 30px 90px rgba(0, 0, 0, 0.38);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 24px;
        line-height: 1.1;
      }

      p {
        margin: 0;
        color: rgba(255, 255, 255, 0.72);
        line-height: 1.5;
      }

      strong {
        color: #ffffff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Curat cache-ul</h1>
      <p id="status">Sterg versiunea veche salvata in browser...</p>
    </main>

    <script>
      const statusEl = document.getElementById("status");

      const reset = async () => {
        if ("serviceWorker" in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }

        if ("caches" in window) {
          const keys = await caches.keys();
          await Promise.all(keys.filter((key) => key.startsWith("bavarianhub-")).map((key) => caches.delete(key)));
        }

        localStorage.clear();
        sessionStorage.clear();

        statusEl.innerHTML = "<strong>Gata.</strong> Deschid aplicatia curata...";
        window.setTimeout(() => {
          window.location.replace("/?cache-reset=" + Date.now());
        }, 900);
      };

      reset().catch((error) => {
        statusEl.textContent = "Nu am putut curata automat cache-ul. Incearca Ctrl+F5 sau sterge Site data din browser.";
        console.error(error);
      });
    </script>
  </body>
</html>
